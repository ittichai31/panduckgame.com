<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Which Inner Cat Are You? | Panduck Studio</title>
    <meta name="description" content="Take the Panduck Studio cat quiz and discover your desktop pet cat match.">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body data-page="quiz">
    <header class="site-header">
      <a class="brand" href="/" aria-label="Panduck Studio home">
        <img class="brand-logo" src="/assets/branding/panduck-game-studio-logo.png" alt="">
        <span class="sr-only">Panduck Game Studio</span>
      </a>
      <nav class="nav-links" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/quiz/adoptcat/" aria-current="page">Cat Quiz</a>
      </nav>
    </header>

    <main class="quiz-shell">
      <section class="quiz-panel" id="quiz-app">
        <div class="quiz-topbar">
          <div>
            <p class="eyebrow" data-i18n="quiz.eyebrow">Desktop pet quiz</p>
            <h1 data-i18n="quiz.title">Which Inner Cat are you?</h1>
          </div>
          <label class="language-picker">
            <span data-i18n="quiz.language">Language</span>
            <select id="language-select" aria-label="Language">
              <option value="en">English</option>
              <option value="th">???</option>
              <option value="es">Espa?ol</option>
              <option value="zh">??</option>
            </select>
          </label>
        </div>

        <div id="intro-screen" class="screen active">
          <div class="intro-layout">
            <div>
              <p class="lead" data-i18n="quiz.intro">Answer 10 tiny personality questions and meet the desktop cat that matches your vibe.</p>
              <div class="hero-actions intro-actions">
                <button class="button primary" id="start-button" type="button" data-i18n="quiz.start">Start quiz</button>
                <a class="button secondary compact-home-button" href="/" data-i18n="quiz.home">Panduck home</a>
              </div>
            </div>
            <div class="cat-orbit" aria-hidden="true">
              <img class="stage-prop orbit-ball-prop" src="/assets/Game%20asset/toy%20ball/pom_ball_idle.png" alt="">
              <img class="stage-prop orbit-robot-prop" src="/assets/Game%20asset/toy%20robot/mouse_robot_idle.png" alt="">
              <img class="sprite cat-animation black-cat" data-cat="blackCat" data-action="sitting" alt="Sitting black cat">
              <img class="sprite cat-animation calico delay-one" data-cat="calico" data-action="grooming" alt="Grooming calico cat">
              <img class="sprite cat-animation british-shorthair delay-two" data-cat="britishShorthair" data-action="walking" alt="Walking British Shorthair cat">
            </div>
          </div>
        </div>

        <div id="question-screen" class="screen">
          <div class="progress-wrap">
            <span id="progress-label">1 / 10</span>
            <div class="progress-track"><span id="progress-bar"></span></div>
          </div>
          <h2 id="question-title"></h2>
          <div class="answer-grid" id="answer-grid"></div>
        </div>

        <div id="result-screen" class="screen">
          <div class="result-layout">
            <div class="result-art">
              <img class="stage-prop result-puzzle-prop" src="/assets/Game%20asset/toy%20puzzle/treat_puzzle2_idle.png" alt="">
              <img class="stage-prop result-ball-prop" src="/assets/Game%20asset/toy%20ball/wooden_ball_idle.png" alt="">
              <img id="result-sprite" class="sprite cat-animation result-sprite orange-cat" data-cat="orangeCat" data-action="sitting" alt="">
            </div>
            <div class="result-copy">
              <p class="eyebrow" data-i18n="result.eyebrow">Your cat match</p>
              <h2 id="result-title"></h2>
              <p id="result-description" class="lead"></p>
              <p id="result-adopt" class="adopt-line"></p>
              <div class="hero-actions">
                <a class="button primary" id="steam-link" href="#" data-i18n="result.adoptCta">Adopt this desktop cat</a>
                <button class="button secondary" id="restart-button" type="button" data-i18n="result.restart">Try again</button>
              </div>
              <p id="share-text" class="share-text"></p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/quiz/adoptcat/quiz.js"></script>
    <script src="/cat-animation.js"></script>
  </body>
</html>
